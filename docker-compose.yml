services:
  playwright: # Tên service
    image: playwright-tests:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    cpus: 2
    mem_limit: 8g
    volumes:
      # Đưa code từ máy vào container.
      - .:/app
      # Giữ node_modules của container, không bị host ghi đè
      - /app/node_modules
      # Show report/trace/video ra host để xem lại sau khi container chạy xong và xoá
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    ipc: host # Bắt buộc — tránh Chromium crash do thiếu shared memory
    env_file:
      - .env.staging