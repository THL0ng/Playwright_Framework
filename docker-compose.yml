services:
  playwright:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-test-runner
    
    volumes:
      # Đưa code từ máy vào container.
      - .:/app
      # Giữ node_modules của container, không bị host ghi đè
      - /app/node_modules
      # Show report/trace/video ra host để xem lại sau khi container chạy xong và xoá
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    ipc: host  # Bắt buộc — tránh Chromium crash do thiếu shared memory
    env_file:
      - .env.staging
    command: npx playwright test --workers=1