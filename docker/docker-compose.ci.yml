services:
  playwright:
    # IMAGE TEST: dùng image đã build sẵn ở build-stage, KHÔNG build lại ở đây.
    # Bắt buộc có TAG, không fallback "latest" -> job FAIL ngay nếu build-stage quên export TAG
    # (tránh test nhầm image cũ -> false-positive nguy hiểm).
    image: "playwright-tests:${TAG:?Loi - bien TAG chua duoc set. Build-stage phai export TAG truoc khi chay test-stage.}"

    # KHÔNG mount code sống (./:/app) -> test đúng image production-like, không phải code trên runner.

    # GIỚI HẠN TÀI NGUYÊN: chỉnh theo runner thật của từng pipeline qua biến CI_CPUS/CI_MEM.
    cpus: ${CI_CPUS:-2}
    mem_limit: ${CI_MEM:-4g}

    # BỘ NHỚ DÙNG CHUNG CHO CHROMIUM: tránh crash do /dev/shm mặc định chỉ 64MB.
    # Dùng shm_size thay vì `ipc: host` -> không share IPC với host, an toàn & chạy được trên k8s runner.
    shm_size: 2gb

    # OUTPUT TEST: lưu report + trace/video/screenshot ra ngoài container để xem khi fail.
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results # bắt buộc — không có thì mất bằng chứng khi fail

    # LỆNH CHẠY TEST: đổi được qua CI_COMMAND (vd: smoke test / full regression / 1 file)
    # mà không cần build lại image.
    command: ${CI_COMMAND:-npx playwright test}

    # NGUỒN CẤU HÌNH BASE_URL & SECRETS — hỗ trợ 2 cách, dùng cách nào cũng được:
    # (1) File .env check-in repo, không chứa secret thật.
    env_file:
      - path: ${ENV_FILE:-.env.ci}
        required: false   # optional -> job không dùng file này thì không fail
    # (2) Secret/biến set trực tiếp từ pipeline (GitHub Actions/GitLab CI vars).
    #     Nếu trùng key với env_file, giá trị ở đây LUÔN THẮNG.
    environment:
      BASE_URL: ${BASE_URL:-}

    # CHO PHÉP GỌI RA APP CHẠY TRÊN HOST RUNNER (khi BASE_URL=http://host.docker.internal:<port>).
    # Trên Linux, host.docker.internal không tự có sẵn như Docker Desktop -> phải khai báo dòng này.
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ============================================================
# CÁCH CHẠY
# ============================================================

# Case 1 — app-under-test là URL bên ngoài (staging) hoặc app chạy trên host runner:
#   TAG=<sha-hoac-build-id> docker compose -f docker-compose.ci.yml run --rm playwright

# Case 2 — app-under-test là 1 container khác cũng spin lên trong job CI này:
#   dùng kèm file override docker-compose.ci.app.yml:
#   TAG=<sha> APP_IMAGE=<app-image> docker compose \
#     -f docker-compose.ci.yml -f docker-compose.ci.app.yml up --abort-on-container-exit