services:
  playwright:
    # Gắn Tag cho image, ko gắn tag thì default là latest
    image: playwright-tests:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile

    # --- Resource limit ---
    # Parametrize để khớp với spec runner CI thật (free runner GitHub ~7GB RAM, 2 core).
    # Set qua biến môi trường CI_CPUS / CI_MEM nếu runner khác nhau giữa các job.
    cpus: ${CI_CPUS:-2}
    mem_limit: ${CI_MEM:-4g}

    # --- Shared memory cho Chromium ---
    # Dùng shm_size thay cho `ipc: host` để tránh Chromium crash do /dev/shm mặc định
    # chỉ 64MB, nhưng KHÔNG share IPC namespace với host (an toàn hơn, đúng nguyên tắc
    # least privilege, không bị flag bởi CIS Docker Benchmark / security scan).
    # Cũng portable hơn: chạy được trên cả Docker Compose, Swarm, Kubernetes,
    # khác với `ipc: host` thường bị chặn bởi policy trên self-hosted runner k8s.
    shm_size: 2gb

    volumes:
      - ..:/app
      - /app/node_modules # tránh ghi đè node_modules từ host
      - ../playwright-report:/app/playwright-report
      - ../test-results:/app/test-results # BẮT BUỘC: chứa trace/video/screenshot khi test fail

    # --- Override lệnh chạy test ---
    # Mặc định chạy toàn bộ test.
    # Override khi cần chạy riêng file hoặc thêm option (ví dụ: --headed, --project). 
    # Ví dụ : CI_COMMAND="npx playwright test --headed --project=firefox" docker compose up
    # CI_COMMAND="npx playwright test tests/e2e/test-exemple.spec.ts" docker compose up
    command: ${CI_COMMAND:-npx playwright test}


    # --- Chọn cấu hình envs ---
    env_file:
      - ../envs/.env.${ENV_FILE:-staging}

    # --- Cầu nối mạng tới máy chủ (Host) ---
    # Giúp container truy cập được ứng dụng đang chạy trên máy của bạn
    # (Bắt buộc phải có khi chạy trên Linux/CI để container tìm thấy host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    

    # ============================================================
# CẤU HÌNH APP-UNDER-TEST (chọn 1 trong 3 cách dưới)
# ============================================================

# [Cách 1] App là service khác trong CÙNG file compose này
#   - Compose tự tạo network chung, gọi nhau bằng tên service.
#   - Bật depends_on dưới đây + set BASE_URL=http://app:<port> trong .env

# depends_on:
#   app:
#     condition: service_healthy

# [Cách 2] Định nghĩa luôn service app ngay trong compose này
# app:
#   image: my-app:latest
#   ports:
#     - "3000:3000"
#   healthcheck:
#     test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
#     interval: 5s
#     timeout: 3s
#     retries: 10

# [Cách 3] App đã chạy sẵn ở staging/production (ngoài compose này)
#   - Không cần sửa gì ở đây, chỉ set trong .env:
#     BASE_URL=https://staging.example.com
