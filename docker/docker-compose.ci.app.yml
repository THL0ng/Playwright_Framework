# FILE NÀY DÙNG KHI: cần test 1 app chạy luôn trong job CI này
# (không dùng khi app đã chạy sẵn ở staging, hoặc app chạy trên máy host).

# CHẠY BẰNG LỆNH:
#   TAG=<sha> APP_IMAGE=<app-image>:<tag> docker compose \
#     -f docker-compose.ci.yml -f docker-compose.ci.app.yml up --abort-on-container-exit

# LƯU Ý:
#   - playwright gọi sang app bằng tên service "app", không cần IP hay localhost.
#   - Phải tự set BASE_URL=http://app:<port> ở file base, nếu không playwright
#     sẽ không biết test vào đâu.

services:
  playwright:
    # Chờ app healthcheck PASS rồi mới chạy test, tránh fail oan do app chưa kịp khởi động.
    depends_on:
      app:
        condition: service_healthy

  app:
    # Bắt buộc set APP_IMAGE, không có default -> tránh test nhầm image rác.
    image: "${APP_IMAGE:?Loi - bien APP_IMAGE chua duoc set}"

    # Dùng để playwright biết khi nào app đã sẵn sàng (xem depends_on phía trên).
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:80" ]
      interval: 5s
      timeout: 3s
      retries: 10